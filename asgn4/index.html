<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CSE160 Lighting Assignment</title>
    <style>body{margin:0;font-family:sans-serif} canvas{width:100vw;height:100vh;display:block}</style>
  </head>
  <body>
    <div style="position:fixed;left:8px;top:8px;z-index:10;background:rgba(255,255,255,0.9);padding:8px;border-radius:6px">
      <button id="toggleLight">Toggle Lighting</button>
      <button id="toggleNormal">Toggle Normal Viz</button>
      <button id="toggleSpot">Toggle Spotlight</button>
      <div>
        Light angle: <input id="lightAngle" type="range" min="0" max="360" value="0" />
      </div>
      <div>
        Light radius: <input id="lightRadius" type="range" min="0" max="10" value="4" />
      </div>
    </div>
    <canvas id="glcanvas"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
